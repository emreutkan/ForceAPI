services:
  db:
    networks:
      - force-network
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-force}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-force_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  vectordb:
    networks:
      - force-network
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-force}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vector_db
    volumes:
      - vector_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d vector_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    networks:
      - force-network
    image: redis:7-alpine
    profiles: ["observability"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sentry:
    networks:
      - force-network
    image: getsentry/sentry:24.1.0
    profiles: ["observability"]
    environment:
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY:-change-me}
      SENTRY_DB_USER: ${POSTGRES_USER:-force}
      SENTRY_DB_PASSWORD: ${POSTGRES_PASSWORD}
      SENTRY_DB_NAME: ${POSTGRES_DB:-force_db}
      SENTRY_DB_HOST: db
      SENTRY_REDIS_HOST: redis
    command: sh -c "sentry upgrade --noinput && sentry run web"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"
    volumes:
      - sentry_data:/var/lib/sentry/files

  web:
    networks:
      - force-network
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app              # mount source code for hot reload
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VECTOR_DATABASE_URL: postgresql://${POSTGRES_USER:-force}:${POSTGRES_PASSWORD}@vectordb:5432/vector_db
      LOCALHOST: "True"
    depends_on:
      db:
        condition: service_healthy

networks:
  force-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500

volumes:
  db_data:
  vector_data:
  sentry_data:
