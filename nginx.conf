events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_types application/json application/javascript text/css text/plain;

    upstream django {
        server web:8000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name api.utrack.irfanemreutkan.com;

        # Let's Encrypt ACME challenge (certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name api.utrack.irfanemreutkan.com;

        # SSL via Let's Encrypt — run certbot first:
        # docker run --rm -v /etc/letsencrypt:/etc/letsencrypt -v ./certbot:/var/www/certbot \
        #   certbot/certbot certonly --webroot -w /var/www/certbot -d api.utrack.irfanemreutkan.com
        ssl_certificate /etc/letsencrypt/live/api.utrack.irfanemreutkan.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.utrack.irfanemreutkan.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # API — proxy to Django/Gunicorn
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Collected static files
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # User media uploads
        location /media/ {
            alias /usr/share/nginx/html/media/;
            expires 7d;
            add_header Cache-Control "public";
        }
    }
}
