name: Bootstrap Oracle Cloud (OCI) – Manual install

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    
    steps:
    - name: Bootstrap via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,SECRET_KEY,ALLOWED_HOSTS,DEPLOY_HOST
        env:
          POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
          POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
          POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
          SECRET_KEY="${{ secrets.SECRET_KEY }}"
          ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}"
          DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"
        script: |
          set -e
          
          # 3. Set defaults for optional variables if they weren't provided
          export POSTGRES_DB="${POSTGRES_DB:-utrack_db}"
          export POSTGRES_USER="${POSTGRES_USER:-utrack_user}"
          export ALLOWED_HOSTS="${ALLOWED_HOSTS:-*}"
          
          echo "Starting Manual Bootstrap for $POSTGRES_DB..."
          
          # 4. Download and run the manual bootstrap script
          curl -fsSL https://raw.githubusercontent.com/emreutkan/utrack-be/master/bootstrap.sh > bootstrap.sh
          chmod +x bootstrap.sh
          ./bootstrap.sh